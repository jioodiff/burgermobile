<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#3B82F6">
    <meta name="description" content="Tugas UI/UX: Implementasi Mobile UX dan Desain Antarmuka Dasar">
    <title>Mobile UX Assignment</title>
    
    <!-- Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="preconnect" href="https://unpkg.com">
    <script src="https://unpkg.com/@phosphor-icons/web" defer></script>

    <style>
        :root {
            /* Color Palette */
            --primary: #3B82F6;
            --primary-hover: #2563EB;
            --primary-light: #EFF6FF;
            --bg-base: #F8FAFC;
            --bg-surface: #FFFFFF;
            --text-main: #0F172A;
            --text-muted: #64748B;
            --border: #E2E8F0;
            --danger: #EF4444;
            --danger-bg: #FEF2F2;
            --success: #10B981;
            
            /* Shadows & Radius */
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
            --radius-md: 12px;
            --radius-lg: 16px;
            
            /* Animations */
            --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #CBD5E1; /* Desktop backdrop */
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 414px;
            height: 100vh;
            background-color: var(--bg-base);
            position: relative;
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.25);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Mockup Frame for Desktop */
        @media (min-width: 415px) {
            .app-container {
                height: 90vh;
                max-height: 896px;
                border-radius: 24px;
                margin: 20px;
                border: 8px solid #0F172A;
            }
        }

        /* HEADER */
        .header {
            background-color: var(--bg-surface);
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            z-index: 20;
            box-shadow: var(--shadow-sm);
        }

        .header-title {
            font-size: 1.125rem;
            font-weight: 600;
            letter-spacing: -0.01em;
        }

        .header-actions {
            display: flex;
            gap: 4px;
        }

        .icon-btn {
            background: none;
            border: none;
            color: var(--text-main);
            font-size: 24px;
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-btn:hover, .icon-btn:focus-visible {
            background-color: var(--border);
            outline: none;
        }

        /* TOP APPS MENU (Submenu) */
        .top-menu-wrapper {
            position: relative;
        }
        
        .top-submenu {
            position: absolute;
            top: 100%;
            right: 0;
            background: var(--bg-surface);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-lg);
            min-width: 160px;
            margin-top: 8px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: var(--transition);
            z-index: 30;
            border: 1px solid var(--border);
        }

        .top-submenu.active {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .submenu-item {
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-main);
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 500;
            transition: var(--transition);
        }

        .submenu-item i {
            font-size: 18px;
            color: var(--text-muted);
        }

        .submenu-item:hover {
            background-color: var(--bg-base);
            color: var(--primary);
        }
        .submenu-item:hover i {
            color: var(--primary);
        }

        .submenu-item:first-child { border-radius: var(--radius-md) var(--radius-md) 0 0; }
        .submenu-item:last-child { border-radius: 0 0 var(--radius-md) var(--radius-md); }

        /* TABS BAR */
        .tabs-bar {
            background-color: var(--bg-surface);
            display: flex;
            padding: 0 16px;
            gap: 24px;
            border-bottom: 1px solid var(--border);
            overflow-x: auto;
            scrollbar-width: none;
        }
        .tabs-bar::-webkit-scrollbar { display: none; }

        .tab {
            padding: 14px 0;
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            position: relative;
            white-space: nowrap;
            transition: var(--transition);
            border: none;
            background: none;
            font-family: inherit;
        }

        .tab:hover {
            color: var(--text-main);
        }

        .tab.active {
            color: var(--primary);
        }

        .tab.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 3px;
            background-color: var(--primary);
            border-radius: 3px 3px 0 0;
        }

        /* MAIN CONTENT */
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            position: relative;
        }

        /* CARD */
        .card {
            background-color: var(--bg-surface);
            border-radius: var(--radius-lg);
            padding: 16px;
            box-shadow: var(--shadow-sm);
            display: flex;
            gap: 16px;
            align-items: center;
            position: relative;
            transition: var(--transition);
            overflow: hidden;
            border: 1px solid transparent;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
            border-color: var(--border);
        }

        .card-img {
            width: 56px;
            height: 56px;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            flex-shrink: 0;
            transition: var(--transition);
        }

        .card:hover .card-img {
            transform: scale(1.05);
        }

        .card-content {
            flex: 1;
            min-width: 0;
        }

        .card-title {
            font-weight: 600;
            font-size: 1rem;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-desc {
            font-size: 0.8125rem;
            color: var(--text-muted);
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .card-action {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 20px;
            cursor: pointer;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .card-action:hover {
            background-color: var(--danger-bg);
            color: var(--danger);
        }

        /* CARD DELETE ANIMATION */
        .card.deleting {
            transform: translateX(-100%);
            opacity: 0;
            margin-bottom: -72px; /* Smooth collapse */
            padding-top: 0;
            padding-bottom: 0;
            border-width: 0;
        }

        /* BOTTOM MENU */
        .bottom-menu {
            background-color: var(--bg-surface);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            padding: 8px 8px calc(8px + env(safe-area-inset-bottom, 0px)) 8px;
            position: relative;
            z-index: 20;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 500;
            transition: var(--transition);
            padding: 8px 16px;
            border-radius: var(--radius-md);
        }

        .nav-item:hover {
            color: var(--primary);
            background-color: var(--primary-light);
        }

        .nav-item.active {
            color: var(--primary);
        }
        
        .nav-item i {
            font-size: 24px;
            margin-bottom: 2px;
        }

        /* BURGER MENU (DRAWER) */
        .drawer-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(15, 23, 42, 0.4);
            opacity: 0;
            visibility: hidden;
            transition: var(--transition);
            z-index: 40;
            backdrop-filter: blur(4px);
        }

        .drawer-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .drawer {
            position: absolute;
            top: 0;
            left: -300px;
            bottom: 0;
            width: 280px;
            background-color: var(--bg-surface);
            z-index: 50;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow-lg);
        }

        .drawer.active {
            transform: translateX(300px);
        }

        .drawer-header {
            padding: 32px 24px 24px 24px;
            background-color: var(--primary);
            color: white;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background-image: linear-gradient(135deg, var(--primary) 0%, #1E3A8A 100%);
        }

        .drawer-avatar {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
        }

        .drawer-user h3 {
            font-size: 1.125rem;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .drawer-user p {
            font-size: 0.875rem;
            opacity: 0.8;
        }

        .drawer-nav {
            padding: 16px 12px;
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .drawer-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 14px 16px;
            color: var(--text-main);
            text-decoration: none;
            font-size: 0.9375rem;
            font-weight: 500;
            transition: var(--transition);
            border-radius: var(--radius-md);
        }

        .drawer-item i {
            font-size: 22px;
            color: var(--text-muted);
            transition: var(--transition);
        }

        .drawer-item:hover {
            background-color: var(--bg-base);
        }

        .drawer-item.active {
            background-color: var(--primary-light);
            color: var(--primary);
        }

        .drawer-item:hover i, .drawer-item.active i {
            color: var(--primary);
        }

        /* UNDO SNACKBAR */
        .snackbar {
            position: absolute;
            bottom: calc(96px + env(safe-area-inset-bottom, 0px));
            left: 16px;
            right: 16px;
            background-color: #1E293B;
            color: white;
            padding: 12px 16px;
            border-radius: var(--radius-md);
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow-lg);
            transform: translateY(150%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 30;
        }

        .snackbar.show {
            transform: translateY(0);
        }
        
        .snackbar-text {
            font-size: 0.875rem;
            font-weight: 500;
        }

        .snackbar-btn {
            background: none;
            border: none;
            color: #60A5FA;
            font-weight: 600;
            text-transform: uppercase;
            cursor: pointer;
            font-size: 0.875rem;
            padding: 6px 12px;
            border-radius: 6px;
            transition: var(--transition);
        }
        
        .snackbar-btn:hover {
            background-color: rgba(96, 165, 250, 0.1);
        }

        /* ACCESSIBILITY UTILS & ANIMATIONS */
        .sr-only {
            position: absolute;
            width: 1px; height: 1px; padding: 0; margin: -1px;
            overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border-width: 0;
        }
        
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .is-spinning { animation: spin 1s linear infinite; }
    </style>
</head>
<body>
    <div class="app-container">
        
        <!-- Header Section -->
        <header class="header">
            <button class="icon-btn" id="burger-btn" aria-label="Buka Menu Navigasi" aria-expanded="false" aria-controls="drawer">
                <i class="ph ph-list"></i>
            </button>
            <h1 class="header-title">Materi UX</h1>
            <div class="header-actions">
                <button class="icon-btn" id="refresh-btn" aria-label="Segarkan Data">
                    <i class="ph ph-arrows-clockwise"></i>
                </button>
                <div class="top-menu-wrapper">
                    <button class="icon-btn" id="top-apps-btn" aria-label="Menu Aplikasi Lainnya" aria-haspopup="true" aria-expanded="false">
                        <i class="ph ph-dots-three-vertical"></i>
                    </button>
                    <!-- Top Apps Menu (Submenu) -->
                    <div class="top-submenu" id="top-submenu" role="menu">
                        <a href="#" class="submenu-item" role="menuitem">
                            <i class="ph ph-sliders-horizontal"></i> Preferensi
                        </a>
                        <a href="#" class="submenu-item" role="menuitem">
                            <i class="ph ph-question"></i> Bantuan
                        </a>
                        <a href="#" class="submenu-item" role="menuitem">
                            <i class="ph ph-sign-out"></i> Keluar
                        </a>
                    </div>
                </div>
            </div>
        </header>

        <!-- Tabs Bar -->
        <nav class="tabs-bar" aria-label="Kategori Tab" role="tablist">
            <button class="tab active" aria-selected="true" role="tab" id="tab-all">Semua</button>
            <button class="tab" aria-selected="false" role="tab" id="tab-recent">Terbaru</button>
            <button class="tab" aria-selected="false" role="tab" id="tab-popular">Populer</button>
            <button class="tab" aria-selected="false" role="tab" id="tab-saved">Tersimpan</button>
        </nav>

        <!-- Main Content -->
        <main class="main-content" id="main-content" role="main">
            <!-- Cards will be populated by JS -->
        </main>

        <!-- Bottom Menu -->
        <nav class="bottom-menu" aria-label="Menu Navigasi Bawah">
            <a href="#" class="nav-item active" aria-label="Beranda">
                <i class="ph-fill ph-house"></i>
                <span>Beranda</span>
            </a>
            <a href="#" class="nav-item" aria-label="Cari">
                <i class="ph ph-magnifying-glass"></i>
                <span>Cari</span>
            </a>
            <a href="#" class="nav-item" aria-label="Tambah Baru">
                <i class="ph ph-plus-circle"></i>
                <span>Tambah</span>
            </a>
            <a href="#" class="nav-item" aria-label="Profil Anda">
                <i class="ph ph-user"></i>
                <span>Profil</span>
            </a>
        </nav>

        <!-- Burger Menu Drawer -->
        <div class="drawer-overlay" id="drawer-overlay" aria-hidden="true"></div>
        <nav class="drawer" id="drawer" aria-label="Menu Utama Drawer" aria-hidden="true">
            <div class="drawer-header">
                <div class="drawer-avatar">
                    <i class="ph ph-user"></i>
                </div>
                <div class="drawer-user">
                    <h3>Siswa UI/UX</h3>
                    <p>Mahasiswa Desain</p>
                </div>
            </div>
            <div class="drawer-nav">
                <a href="#" class="drawer-item active">
                    <i class="ph ph-house"></i> Beranda
                </a>
                <a href="#" class="drawer-item">
                    <i class="ph ph-folder"></i> Proyek Saya
                </a>
                <a href="#" class="drawer-item">
                    <i class="ph ph-bookmark-simple"></i> Disimpan
                </a>
                <hr style="border:0; border-top:1px solid var(--border); margin: 8px 0;">
                <a href="#" class="drawer-item">
                    <i class="ph ph-gear"></i> Pengaturan
                </a>
            </div>
        </nav>

        <!-- Undo Delete Snackbar -->
        <div class="snackbar" id="undo-snackbar" role="alert" aria-live="assertive">
            <span class="snackbar-text">Item berhasil dihapus</span>
            <button type="button" class="snackbar-btn" id="undo-btn" onclick="undoDelete()">Batal</button>
        </div>

    </div>

    <script>
        // Data for Cards
        const initialCards = [
            { id: 1, title: 'Desain Antarmuka', desc: 'Mempelajari prinsip dasar pembuatan antarmuka pengguna yang baik.', icon: 'ph-paint-brush', color: '#3B82F6' },
            { id: 2, title: 'Pengalaman Pengguna', desc: 'Fokus pada alur pengguna dan kenyamanan dalam menggunakan aplikasi.', icon: 'ph-users', color: '#10B981' },
            { id: 3, title: 'Prototyping Interaktif', desc: 'Membuat rancangan interaktif sebelum proses pengembangan dimulai.', icon: 'ph-device-mobile', color: '#F59E0B' },
            { id: 4, title: 'Aksesibilitas Web', desc: 'Memastikan aplikasi dapat digunakan oleh semua orang tanpa hambatan.', icon: 'ph-wheelchair', color: '#8B5CF6' },
        ];

        let deletedCardId = null;
        let undoTimeout = null;

        // Render Cards
        function renderCards() {
            const mainContent = document.getElementById('main-content');
            mainContent.innerHTML = ''; 
            initialCards.forEach(card => {
                const cardEl = document.createElement('div');
                cardEl.className = 'card';
                cardEl.id = 'card-' + card.id;
                
                // Color formatting for icons
                const rgb = hexToRgb(card.color);
                const bgStyle = 'background-color: rgba(' + rgb + ', 0.15); color: ' + card.color + ';';

                cardEl.innerHTML = `
                    <div class="card-img" style="${bgStyle}">
                        <i class="ph ${card.icon}"></i>
                    </div>
                    <div class="card-content">
                        <h3 class="card-title">${card.title}</h3>
                        <p class="card-desc">${card.desc}</p>
                    </div>
                    <button class="card-action" aria-label="Hapus ${card.title}" onclick="deleteCard(${card.id})">
                        <i class="ph ph-trash"></i>
                    </button>
                `;
                mainContent.appendChild(cardEl);
            });
        }

        // Utility to convert hex to rgb for background opacity
        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? 
                parseInt(result[1], 16) + ', ' + parseInt(result[2], 16) + ', ' + parseInt(result[3], 16) : null;
        }

        // Delete Card Logic
        window.deleteCard = function(id) {
            const cardEl = document.getElementById('card-' + id);
            if(!cardEl) return;
            
            // Add deleting animation class
            cardEl.classList.add('deleting');
            
            // Wait for animation, then hide
            setTimeout(() => {
                // Jangan sembunyikan jika card sudah di-undo (deletedCardId sudah null atau berubah)
                if (deletedCardId === id) {
                    cardEl.style.display = 'none';
                }
            }, 250); // Matches CSS transition time

            // Permanently delete previously queued item
            if (deletedCardId !== null && deletedCardId !== id) {
                const prevDeleted = document.getElementById('card-' + deletedCardId);
                if(prevDeleted) prevDeleted.remove();
            }

            deletedCardId = id;
            showSnackbar();
        };

        // Snackbar Logic
        function showSnackbar() {
            const snackbar = document.getElementById('undo-snackbar');
            snackbar.classList.add('show');
            
            if(undoTimeout) clearTimeout(undoTimeout);
            
            // Auto hide and permanently delete after 4s
            undoTimeout = setTimeout(() => {
                snackbar.classList.remove('show');
                if(deletedCardId) {
                    const cardEl = document.getElementById('card-' + deletedCardId);
                    if(cardEl) cardEl.remove();
                    deletedCardId = null;
                }
            }, 4000); 
        }

        // Undo Button Logic
        window.undoDelete = function() {
            if(deletedCardId) {
                const cardEl = document.getElementById('card-' + deletedCardId);
                if(cardEl) {
                    cardEl.style.display = 'flex';
                    // Force reflow for animation restart
                    void cardEl.offsetWidth;
                    cardEl.classList.remove('deleting');
                }
                deletedCardId = null;
            }
            
            const snackbar = document.getElementById('undo-snackbar');
            snackbar.classList.remove('show');
            if(undoTimeout) clearTimeout(undoTimeout);
        };

        // Top Apps Submenu
        const topAppsBtn = document.getElementById('top-apps-btn');
        const topSubmenu = document.getElementById('top-submenu');

        topAppsBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            const isExpanded = topAppsBtn.getAttribute('aria-expanded') === 'true';
            topAppsBtn.setAttribute('aria-expanded', !isExpanded);
            topSubmenu.classList.toggle('active');
        });

        document.addEventListener('click', (e) => {
            if (!topSubmenu.contains(e.target) && e.target !== topAppsBtn) {
                topSubmenu.classList.remove('active');
                topAppsBtn.setAttribute('aria-expanded', 'false');
            }
        });

        // Drawer Logic
        const burgerBtn = document.getElementById('burger-btn');
        const drawer = document.getElementById('drawer');
        const drawerOverlay = document.getElementById('drawer-overlay');

        function openDrawer() {
            drawer.classList.add('active');
            drawerOverlay.classList.add('active');
            burgerBtn.setAttribute('aria-expanded', 'true');
            drawer.setAttribute('aria-hidden', 'false');
        }

        function closeDrawer() {
            drawer.classList.remove('active');
            drawerOverlay.classList.remove('active');
            burgerBtn.setAttribute('aria-expanded', 'false');
            drawer.setAttribute('aria-hidden', 'true');
        }

        burgerBtn.addEventListener('click', openDrawer);
        drawerOverlay.addEventListener('click', closeDrawer);

        // Tabs Logic
        const tabs = document.querySelectorAll('.tab');
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => {
                    t.classList.remove('active');
                    t.setAttribute('aria-selected', 'false');
                });
                tab.classList.add('active');
                tab.setAttribute('aria-selected', 'true');
            });
        });

        // Bottom Navigation Logic (Visual Only)
        const navItems = document.querySelectorAll('.nav-item');
        navItems.forEach(item => {
            item.addEventListener('click', (e) => {
                e.preventDefault();
                navItems.forEach(nav => {
                    nav.classList.remove('active');
                    // Reset icon to outline
                    const icon = nav.querySelector('i');
                    if(icon) {
                        icon.className = icon.className.replace('ph-fill', 'ph');
                    }
                });
                item.classList.add('active');
                // Set active icon to fill
                const icon = item.querySelector('i');
                if(icon) {
                    icon.className = icon.className.replace('ph', 'ph-fill');
                    // Add base ph class back
                    icon.classList.add('ph');
                }
            });
        });

        // Refresh Logic
        const refreshBtn = document.getElementById('refresh-btn');
        const refreshIcon = refreshBtn.querySelector('i');

        window.refreshData = function() {
            if(refreshIcon.classList.contains('is-spinning')) return;
            
            refreshIcon.classList.add('is-spinning');
            
            // Simulate Data Fetch
            setTimeout(() => {
                refreshIcon.classList.remove('is-spinning');
                
                // Reset State
                deletedCardId = null;
                if(undoTimeout) clearTimeout(undoTimeout);
                document.getElementById('undo-snackbar').classList.remove('show');
                
                // Re-render
                renderCards();
            }, 800);
        };

        refreshBtn.addEventListener('click', refreshData);

        // Animasi Moveover Logic (Programmatic)
        window.triggerMoveoverAnimation = function(element) {
            if(element) {
                // Menambahkan style inline untuk mensimulasikan hover/moveover
                element.style.transition = 'var(--transition)';
                element.style.transform = 'translateY(-4px) scale(1.02)';
                element.style.boxShadow = 'var(--shadow-md)';
                
                // Mengembalikan ke semula setelah 300ms
                setTimeout(() => {
                    element.style.transform = '';
                    element.style.boxShadow = '';
                }, 300);
            }
        };

        // Initialize App
        renderCards();

    </script>
</body>
</html>
